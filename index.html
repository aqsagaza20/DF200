<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTerm AI - عرض شامل لجميع الحقول</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: #f0f4f8;
            color: #1e293b;
            padding: 16px;
            padding-bottom: 90px;
            min-height: 100vh;
        }
        
        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(39, 174, 96, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo i {
            color: #27ae60;
            font-size: 32px;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 15px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }
        
        .logo span {
            color: #27ae60;
            font-size: 14px;
        }
        
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
        }
        
        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
            font-family: 'Tajawal', sans-serif;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .loading i {
            font-size: 48px;
            margin-bottom: 20px;
            color: #27ae60;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-top: 10px;
            margin-bottom: 20px;
        }
        
        .result-item {
            padding: 18px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
        }
        
        .result-item:hover {
            background: #f8fafc;
        }
        
        .result-term {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
        }
        
        .result-arabic {
            color: #27ae60;
            margin-top: 5px;
            font-size: 16px;
        }
        
        .result-meta {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
        }
        
        .detail-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
        }
        
        .term-title {
            font-size: 42px;
            font-weight: 800;
            color: #1e293b;
        }
        
        .term-arabic {
            font-size: 32px;
            color: #27ae60;
            margin-top: 10px;
            font-weight: 700;
        }
        
        .save-btn {
            background: #f1f5f9;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            color: #f1c40f;
            cursor: pointer;
        }
        
        .save-btn.saved {
            background: #f1c40f;
            color: white;
        }
        
        .pronunciation {
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            font-size: 18px;
            border: 1px solid #e2e8f0;
        }
        
        /* ========== الحقول الشاملة ========== */
        
        /* الحاوية الرئيسية لجميع الحقول */
        .fields-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 25px 0;
        }
        
        /* قسم كل مجموعة من الحقول */
        .field-section {
            background: #f8fafc;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #27ae60;
        }
        
        .section-header i {
            font-size: 20px;
            color: #27ae60;
            background: white;
            padding: 8px;
            border-radius: 12px;
        }
        
        .section-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }
        
        /* شبكة الحقول */
        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        
        /* بطاقة الحقل الواحد */
        .field-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        
        .field-card:hover {
            border-color: #27ae60;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.1);
        }
        
        .field-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .field-value {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            word-break: break-word;
        }
        
        /* القيم المتعددة (مصفوفات) */
        .array-values {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .array-tag {
            background: #e8f5e9;
            color: #27ae60;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* الكائنات المتداخلة (مثل parts) */
        .nested-object {
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .nested-item {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px dashed #e2e8f0;
        }
        
        .nested-item:last-child {
            border-bottom: none;
        }
        
        .nested-label {
            color: #27ae60;
            font-weight: 600;
            font-size: 14px;
        }
        
        .nested-value {
            color: #1e293b;
        }
        
        /* الأمراض */
        .disease-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-right: 5px solid #e74c3c;
        }
        
        .disease-name {
            font-size: 20px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 15px;
        }
        
        .disease-field {
            margin: 12px 0;
        }
        
        .disease-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 5px;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .symptom-tag {
            background: #fee;
            color: #e74c3c;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .treatment-tag {
            background: #e8f5e9;
            color: #27ae60;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 14px;
        }
        
        /* معلومات أساسية */
        .basic-info {
            background: linear-gradient(135deg, #1e293b, #2d3a4f);
            color: white;
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 25px;
        }
        
        .info-row {
            display: flex;
            margin: 10px 0;
        }
        
        .info-label {
            width: 120px;
            color: #94a3b8;
        }
        
        .info-content {
            flex: 1;
            font-weight: 500;
        }
        
        /* أزرار التنقل */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 10px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #94a3b8;
            font-size: 12px;
            flex: 1;
            cursor: pointer;
            gap: 5px;
        }
        
        .nav-item.active {
            color: #27ae60;
        }
        
        .back-button {
            background: #f1f5f9;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
        }
        
        /* إشعارات */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        @media (max-width: 480px) {
            .term-title { font-size: 32px; }
            .term-arabic { font-size: 24px; }
            .fields-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <i class="fas fa-heartbeat"></i>
            <div>
                <h1>MedTerm AI</h1>
                <span>عرض جميع الحقول</span>
            </div>
        </div>
        <button class="back-btn" onclick="showHome()">
            <i class="fas fa-home"></i> الرئيسية
        </button>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن مصطلح طبي..." autocomplete="off">
    </div>

    <div id="mainContent">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>جاري تحميل الموسوعة الطبية...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showHome()">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="showAllTerms()">
            <i class="fas fa-list"></i>
            <span>جميع المصطلحات</span>
        </div>
        <div class="nav-item" onclick="focusSearch()">
            <i class="fas fa-search"></i>
            <span>البحث</span>
        </div>
        <div class="nav-item" onclick="showSaved()">
            <i class="fas fa-star"></i>
            <span>محفوظات</span>
        </div>
    </div>

    <script>
        // ==================== المتغيرات العامة ====================
        let allTerms = [];
        let chapters = [];
        let savedTerms = JSON.parse(localStorage.getItem('medTerm_savedTerms') || '[]');
        
        const mainContent = document.getElementById('mainContent');
        const searchInput = document.getElementById('searchInput');

        // ==================== تحميل جميع الفصول ====================
        async function loadAllChapters() {
            try {
                const chaptersInfo = [
                    { num: 1, file: 'database/chapter1.json' },
                    { num: 2, file: 'database/chapter2.json' },
                    { num: 3, file: 'database/chapter3.json' },
                    { num: 4, file: 'database/chapter4.json' },
                    { num: 5, file: 'database/chapter5.json' },
                    { num: 6, file: 'database/chapter6.json' },
                    { num: 7, file: 'database/chapter7.json' },
                    { num: 8, file: 'database/chapter8.json' },
                    { num: 9, file: 'database/chapter9.json' },
                    { num: 10, file: 'database/chapter10.json' },
                    { num: 11, file: 'database/chapter11.json' }
                ];

                for (const chapter of chaptersInfo) {
                    try {
                        const response = await fetch(chapter.file);
                        if (!response.ok) continue;
                        
                        const data = await response.json();
                        
                        chapters.push({
                            number: data.chapter,
                            title: data.arabicTitle || data.title,
                            count: data.terms.length
                        });
                        
                        allTerms = [...allTerms, ...data.terms];
                        
                    } catch (e) {
                        console.log(`خطأ في الفصل ${chapter.num}`);
                    }
                }

                allTerms.sort((a, b) => a.id - b.id);
                showHome();
                
            } catch (error) {
                showError('فشل تحميل قاعدة البيانات');
            }
        }

        // ==================== عرض جميع الحقول في بطاقة المصطلح ====================
        function showTermDetail(id) {
            const term = allTerms.find(t => t.id === id);
            if (!term) return;

            const isSaved = savedTerms.includes(id);
            
            // دالة لإنشاء عرض الحقول بشكل ديناميكي
            function renderField(label, value, icon = 'fa-tag') {
                if (value === undefined || value === null || value === '') return '';
                
                // معالجة المصفوفات
                if (Array.isArray(value)) {
                    return `
                        <div class="field-card">
                            <div class="field-label"><i class="fas ${icon}"></i> ${label}</div>
                            <div class="array-values">
                                ${value.map(v => `<span class="array-tag">${v}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                
                // معالجة الكائنات
                if (typeof value === 'object') {
                    let nestedHtml = '<div class="nested-object">';
                    for (const [key, val] of Object.entries(value)) {
                        if (val && typeof val === 'object') {
                            nestedHtml += `<div class="nested-item"><span class="nested-label">${key}:</span> <span class="nested-value">${JSON.stringify(val)}</span></div>`;
                        } else {
                            nestedHtml += `<div class="nested-item"><span class="nested-label">${key}:</span> <span class="nested-value">${val || '-'}</span></div>`;
                        }
                    }
                    nestedHtml += '</div>';
                    return `
                        <div class="field-card">
                            <div class="field-label"><i class="fas ${icon}"></i> ${label}</div>
                            ${nestedHtml}
                        </div>
                    `;
                }
                
                // القيم العادية
                return `
                    <div class="field-card">
                        <div class="field-label"><i class="fas ${icon}"></i> ${label}</div>
                        <div class="field-value">${value}</div>
                    </div>
                `;
            }

            // بناء HTML لجميع الحقول
            let allFieldsHtml = '<div class="fields-container">';
            
            // 1. المعلومات الأساسية
            allFieldsHtml += `
                <div class="basic-info">
                    <div class="info-row"><span class="info-label">المعرف:</span><span class="info-content">${term.id || '-'}</span></div>
                    <div class="info-row"><span class="info-label">الفصل:</span><span class="info-content">${term.chapter || '-'}</span></div>
                    <div class="info-row"><span class="info-label">النوع:</span><span class="info-content">${term.type || '-'}</span></div>
                </div>
            `;
            
            // 2. قسم التعريفات
            allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-book"></i><h3>التعريفات</h3></div><div class="fields-grid">';
            allFieldsHtml += renderField('الاسم الإنجليزي', term.term, 'fa-language');
            allFieldsHtml += renderField('الاسم العربي', term.arabic, 'fa-language');
            allFieldsHtml += renderField('الاسم اللاتيني', term.latin, 'fa-scroll');
            allFieldsHtml += renderField('النطق', term.pronunciation, 'fa-microphone');
            allFieldsHtml += renderField('التعريف (عربي)', term.definition, 'fa-align-right');
            allFieldsHtml += renderField('التعريف (إنجليزي)', term.definition_en, 'fa-align-left');
            allFieldsHtml += renderField('الجملة الإنجليزية', term.englishSentence, 'fa-quote-right');
            allFieldsHtml += '</div></div>';
            
            // 3. قسم التحليل (parts)
            if (term.parts) {
                allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-puzzle-piece"></i><h3>تحليل المصطلح</h3></div><div class="fields-grid">';
                
                for (const [partType, partData] of Object.entries(term.parts)) {
                    if (partData && typeof partData === 'object') {
                        let partHtml = `<div class="field-card"><div class="field-label"><i class="fas fa-code"></i> ${partType}</div><div class="nested-object">`;
                        for (const [key, val] of Object.entries(partData)) {
                            partHtml += `<div class="nested-item"><span class="nested-label">${key}:</span> <span class="nested-value">${val || '-'}</span></div>`;
                        }
                        partHtml += '</div></div>';
                        allFieldsHtml += partHtml;
                    }
                }
                
                allFieldsHtml += '</div></div>';
            }
            
            // 4. معلومات الجهاز
            allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-heartbeat"></i><h3>معلومات الجهاز</h3></div><div class="fields-grid">';
            allFieldsHtml += renderField('الجهاز (عربي)', term.system, 'fa-stethoscope');
            allFieldsHtml += renderField('الجهاز (إنجليزي)', term.system_en, 'fa-stethoscope');
            allFieldsHtml += renderField('وظيفة الجهاز (عربي)', term.systemFunction, 'fa-cogs');
            allFieldsHtml += renderField('وظيفة الجهاز (إنجليزي)', term.systemFunction_en, 'fa-cogs');
            allFieldsHtml += '</div></div>';
            
            // 5. الموقع التشريحي
            allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-map-marker-alt"></i><h3>الموقع التشريحي</h3></div><div class="fields-grid">';
            allFieldsHtml += renderField('الموقع (عربي)', term.location, 'fa-location-dot');
            allFieldsHtml += renderField('الموقع (إنجليزي)', term.location_en, 'fa-location-dot');
            allFieldsHtml += renderField('الأعضاء المجاورة (عربي)', term.nearbyOrgans, 'fa-project-diagram');
            allFieldsHtml += renderField('الأعضاء المجاورة (إنجليزي)', term.nearbyOrgans_en, 'fa-project-diagram');
            allFieldsHtml += '</div></div>';
            
            // 6. الكلمات المفتاحية
            allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-key"></i><h3>كلمات مفتاحية</h3></div><div class="fields-grid">';
            allFieldsHtml += renderField('keywords', term.keywords, 'fa-tags');
            allFieldsHtml += '</div></div>';
            
            // 7. الوظائف (functions)
            if (term.functions) {
                allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-tasks"></i><h3>الوظائف</h3></div><div class="fields-grid">';
                allFieldsHtml += renderField('functions', term.functions, 'fa-check-circle');
                allFieldsHtml += '</div></div>';
            }
            
            // 8. الاختصارات
            if (term.abbreviation) {
                allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-font"></i><h3>الاختصارات</h3></div><div class="fields-grid">';
                allFieldsHtml += renderField('الاختصار', term.abbreviation, 'fa-bolt');
                if (term.fullForm) allFieldsHtml += renderField('الاسم الكامل', term.fullForm, 'fa-expand');
                if (term.category) allFieldsHtml += renderField('التصنيف', term.category, 'fa-layer-group');
                allFieldsHtml += '</div></div>';
            }
            
            // 9. الأمراض
            if (term.diseases && term.diseases.length > 0) {
                allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-disease"></i><h3>الأمراض المرتبطة</h3></div>';
                
                term.diseases.forEach((disease, index) => {
                    allFieldsHtml += `
                        <div class="disease-card">
                            <div class="disease-name">📌 ${disease.name || disease.name_en || `مرض ${index + 1}`}</div>
                            
                            ${disease.name ? `<div class="disease-field"><div class="disease-label">الاسم (عربي):</div><div>${disease.name}</div></div>` : ''}
                            ${disease.name_en ? `<div class="disease-field"><div class="disease-label">الاسم (إنجليزي):</div><div>${disease.name_en}</div></div>` : ''}
                            
                            ${disease.symptoms ? `
                                <div class="disease-field">
                                    <div class="disease-label">الأعراض (عربي):</div>
                                    <div class="tags-container">
                                        ${disease.symptoms.map(s => `<span class="symptom-tag"><i class="fas fa-circle"></i> ${s}</span>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${disease.symptoms_en ? `
                                <div class="disease-field">
                                    <div class="disease-label">الأعراض (إنجليزي):</div>
                                    <div class="tags-container">
                                        ${disease.symptoms_en.map(s => `<span class="symptom-tag"><i class="fas fa-circle"></i> ${s}</span>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${disease.treatments ? `
                                <div class="disease-field">
                                    <div class="disease-label">العلاج (عربي):</div>
                                    <div class="tags-container">
                                        ${disease.treatments.map(t => `<span class="treatment-tag"><i class="fas fa-check"></i> ${t}</span>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${disease.treatments_en ? `
                                <div class="disease-field">
                                    <div class="disease-label">العلاج (إنجليزي):</div>
                                    <div class="tags-container">
                                        ${disease.treatments_en.map(t => `<span class="treatment-tag"><i class="fas fa-check"></i> ${t}</span>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                allFieldsHtml += '</div>';
            }
            
            // 10. حقول إضافية (أي حقول أخرى غير مغطاة)
            const extraFields = ['singular', 'plural', 'functions', 'abbreviation', 'fullForm', 'category'];
            const allKeys = Object.keys(term);
            const coveredKeys = ['id', 'term', 'arabic', 'latin', 'pronunciation', 'definition', 'definition_en', 
                               'englishSentence', 'parts', 'system', 'system_en', 'systemFunction', 'systemFunction_en',
                               'location', 'location_en', 'nearbyOrgans', 'nearbyOrgans_en', 'keywords', 'chapter', 
                               'type', 'diseases', 'functions', 'abbreviation', 'fullForm', 'category', 'singular', 'plural'];
            
            const remainingKeys = allKeys.filter(key => !coveredKeys.includes(key) && term[key] !== undefined);
            
            if (remainingKeys.length > 0) {
                allFieldsHtml += '<div class="field-section"><div class="section-header"><i class="fas fa-ellipsis-h"></i><h3>حقول إضافية</h3></div><div class="fields-grid">';
                remainingKeys.forEach(key => {
                    allFieldsHtml += renderField(key, term[key], 'fa-plus-circle');
                });
                allFieldsHtml += '</div></div>';
            }
            
            allFieldsHtml += '</div>'; // إغلاق fields-container

            // عرض الصفحة كاملة
            mainContent.innerHTML = `
                <div class="detail-card">
                    <div class="term-header">
                        <div>
                            <div class="term-title">${term.term}</div>
                            <div class="term-arabic">${term.arabic}</div>
                        </div>
                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(${term.id})">
                            <i class="${isSaved ? 'fas' : 'far'} fa-star"></i>
                        </button>
                    </div>

                    ${term.pronunciation ? `
                        <div class="pronunciation">
                            <i class="fas fa-microphone-alt"></i>
                            <span>${term.pronunciation}</span>
                        </div>
                    ` : ''}

                    ${allFieldsHtml}

                    <button class="back-button" onclick="showHome()">
                        <i class="fas fa-arrow-right"></i> عودة للرئيسية
                    </button>
                </div>
            `;
        }

        // ==================== عرض الصفحة الرئيسية ====================
        function showHome() {
            if (allTerms.length === 0) {
                mainContent.innerHTML = `
                    <div class="results-container" style="text-align: center; padding: 60px;">
                        <i class="fas fa-database" style="font-size: 64px; color: #94a3b8;"></i>
                        <p style="margin: 20px 0;">جاري التحميل...</p>
                    </div>
                `;
                return;
            }
            
            const recentTerms = allTerms.slice(-20).reverse();
            
            mainContent.innerHTML = `
                <div class="results-container">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-fire" style="color: #27ae60;"></i> أحدث المصطلحات (${allTerms.length} إجمالي)</h3>
                    
                    ${recentTerms.map(term => `
                        <div class="result-item" onclick="showTermDetail(${term.id})">
                            <div style="display: flex; justify-content: space-between;">
                                <div class="result-term">${term.term}</div>
                                <span style="color: #27ae60;">${term.arabic}</span>
                            </div>
                            <div class="result-meta">
                                <span><i class="fas fa-folder"></i> فصل ${term.chapter || '?'}</span>
                                <span><i class="fas fa-tag"></i> ${term.type || 'مصطلح'}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== عرض جميع المصطلحات ====================
        function showAllTerms() {
            mainContent.innerHTML = `
                <div class="results-container">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-list"></i> جميع المصطلحات (${allTerms.length})</h3>
                    
                    ${allTerms.slice(0, 50).map(term => `
                        <div class="result-item" onclick="showTermDetail(${term.id})">
                            <div style="display: flex; justify-content: space-between;">
                                <div class="result-term">${term.term}</div>
                                <span style="color: #27ae60;">${term.arabic}</span>
                            </div>
                            <div class="result-meta">
                                <span><i class="fas fa-folder"></i> فصل ${term.chapter || '?'}</span>
                            </div>
                        </div>
                    `).join('')}
                    
                    ${allTerms.length > 50 ? '<p style="text-align: center; margin-top: 20px;">والمزيد...</p>' : ''}
                </div>
            `;
        }

        // ==================== البحث ====================
        function search(query) {
            if (!query || query.length < 2) {
                showHome();
                return;
            }

            query = query.toLowerCase().trim();
            
            const results = allTerms.filter(term => {
                return (
                    (term.term && term.term.toLowerCase().includes(query)) ||
                    (term.arabic && term.arabic.includes(query)) ||
                    (term.latin && term.latin.toLowerCase().includes(query)) ||
                    (term.definition && term.definition.toLowerCase().includes(query)) ||
                    (term.keywords && term.keywords.some(k => k && k.toLowerCase().includes(query)))
                );
            });

            if (results.length === 0) {
                mainContent.innerHTML = `
                    <div class="results-container" style="text-align: center; padding: 60px;">
                        <i class="fas fa-search" style="font-size: 64px; color: #94a3b8;"></i>
                        <p style="margin: 20px 0;">لا توجد نتائج لـ "${query}"</p>
                    </div>
                `;
                return;
            }

            mainContent.innerHTML = `
                <div class="results-container">
                    <h3 style="margin-bottom: 20px;">نتائج البحث عن "${query}" (${results.length})</h3>
                    
                    ${results.slice(0, 30).map(term => `
                        <div class="result-item" onclick="showTermDetail(${term.id})">
                            <div style="display: flex; justify-content: space-between;">
                                <div class="result-term">${term.term}</div>
                                <span style="color: #27ae60;">${term.arabic}</span>
                            </div>
                            <div class="result-meta">
                                <span><i class="fas fa-folder"></i> فصل ${term.chapter || '?'}</span>
                                <span><i class="fas fa-scroll"></i> ${term.latin || ''}</span>
                            </div>
                        </div>
                    `).join('')}
                    
                    ${results.length > 30 ? '<p style="text-align: center; margin-top: 20px;">و' + (results.length - 30) + ' نتائج أخرى...</p>' : ''}
                </div>
            `;
        }

        // ==================== حفظ/إزالة من المفضلة ====================
        function toggleSave(id) {
            if (savedTerms.includes(id)) {
                savedTerms = savedTerms.filter(t => t !== id);
                showToast('تمت الإزالة من المحفوظات');
            } else {
                savedTerms.push(id);
                showToast('تمت الإضافة للمحفوظات');
            }
            localStorage.setItem('medTerm_savedTerms', JSON.stringify(savedTerms));
            showTermDetail(id);
        }

        // ==================== عرض المحفوظات ====================
        function showSaved() {
            const saved = allTerms.filter(t => savedTerms.includes(t.id));
            
            if (saved.length === 0) {
                mainContent.innerHTML = `
                    <div class="results-container" style="text-align: center; padding: 60px;">
                        <i class="far fa-star" style="font-size: 64px; color: #f1c40f;"></i>
                        <p style="margin: 20px 0;">لا توجد مصطلحات محفوظة</p>
                    </div>
                `;
                return;
            }

            mainContent.innerHTML = `
                <div class="results-container">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-star" style="color: #f1c40f;"></i> المحفوظات (${saved.length})</h3>
                    
                    ${saved.map(term => `
                        <div class="result-item" onclick="showTermDetail(${term.id})">
                            <div style="display: flex; justify-content: space-between;">
                                <div class="result-term">${term.term}</div>
                                <span style="color: #27ae60;">${term.arabic}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== عرض الخطأ ====================
        function showError(message) {
            mainContent.innerHTML = `
                <div class="results-container" style="text-align: center; padding: 60px;">
                    <i class="fas fa-exclamation-circle" style="font-size: 64px; color: #e74c3c;"></i>
                    <p style="margin: 20px 0;">${message}</p>
                    <button class="back-button" onclick="location.reload()">
                        <i class="fas fa-redo"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }

        // ==================== إشعارات Toast ====================
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== دوال مساعدة ====================
        function focusSearch() {
            searchInput.focus();
        }

        // ==================== الأحداث ====================
        searchInput.addEventListener('input', (e) => {
            search(e.target.value);
        });

        // بدء التحميل
        loadAllChapters();
    </script>
</body>
</html>
